<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="./icon/bridge.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여행 플래너 - 인천 여행지 소개</title>
  <meta name="description" content="나만의 여행 일정을 계획하고 관리해보세요.">
  <meta property="og:title" content="여행 플래너 - 인천 여행지 소개">
  <meta property="og:description" content="날짜별 여행 일정을 직접 작성하고 관리하는 플래너입니다.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/planner.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">
      <img src="./icon/bridge.png" alt="다리 아이콘" class="icon">
      <img src="./icon/incheon.png" alt="도시 아이콘" class="icon">
      <h1>여행 플래너</h1>
    </a>
    <nav>
      <ul>
        <li><a href="index.html">홈</a></li>
        <li><a href="about.html">소개</a></li>
        <li><a href="reviews.html">후기</a></li>
        <li><a href="planner.html" class="active">플래너</a></li>
        <li><a href="contact.html">문의</a></li>
      </ul>
    </nav>
    <button class="hamburger" onclick="toggleNav()">☰</button>
    <button class="dark-toggle" id="dark-btn" onclick="toggleDark()">🌙</button>
  </header>

  <button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <main class="planner-wrap">

    <!-- 플랜 목록 -->
    <section class="plans-section">
      <div class="plans-header">
        <h2>내 여행 플랜</h2>
        <button id="new-plan-btn" onclick="openPlanModal()">+ 새 플랜</button>
      </div>
      <ul id="plan-list"></ul>
      <p id="plan-empty-msg" class="empty-msg">플랜을 먼저 만들어보세요!</p>
    </section>

    <!-- 플랜 생성 모달 -->
    <div id="plan-modal" class="modal-overlay" onclick="closePlanModalOutside(event)">
      <div class="modal-box">
        <h3>새 여행 플랜</h3>
        <form id="plan-form">
          <div class="form-group">
            <label for="p-name">여행 이름</label>
            <input type="text" id="p-name" placeholder="예) 인천 당일치기" required maxlength="30">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="p-start">시작일</label>
              <input type="date" id="p-start" required>
            </div>
            <div class="form-group">
              <label for="p-end">종료일</label>
              <input type="date" id="p-end" required>
            </div>
          </div>
          <div class="modal-actions">
            <button type="button" onclick="closePlanModal()">취소</button>
            <button type="submit">만들기</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 플랜 수정 모달 -->
    <div id="rename-modal" class="modal-overlay" onclick="closeRenameModalOutside(event)">
      <div class="modal-box">
        <h3>플랜 수정</h3>
        <form id="rename-form">
          <input type="hidden" id="r-id">
          <div class="form-group">
            <label for="r-name">여행 이름</label>
            <input type="text" id="r-name" required maxlength="30">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="r-start">시작일</label>
              <input type="date" id="r-start" required>
            </div>
            <div class="form-group">
              <label for="r-end">종료일</label>
              <input type="date" id="r-end" required>
            </div>
          </div>
          <div class="modal-actions">
            <button type="button" onclick="closeRenameModal()">취소</button>
            <button type="submit">저장</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 일정 수정 모달 -->
    <div id="edit-modal" class="modal-overlay" onclick="closeEditModalOutside(event)">
      <div class="modal-box">
        <h3>일정 수정</h3>
        <form id="edit-form">
          <input type="hidden" id="e-id">
          <div class="form-row">
            <div class="form-group">
              <label for="e-date">날짜</label>
              <input type="date" id="e-date" required>
            </div>
            <div class="form-group">
              <label for="e-time">시간</label>
              <input type="time" id="e-time">
            </div>
          </div>
          <div class="form-group">
            <label for="e-place">장소</label>
            <input type="text" id="e-place" required maxlength="30">
          </div>
          <div class="form-group">
            <label for="e-memo">메모</label>
            <input type="text" id="e-memo" maxlength="80">
          </div>
          <div class="form-group">
            <label>카테고리</label>
            <div class="category-selector" id="e-category">
              <button type="button" data-value="관광" class="cat-btn">🏛️ 관광</button>
              <button type="button" data-value="식사" class="cat-btn">🍽️ 식사</button>
              <button type="button" data-value="숙박" class="cat-btn">🏨 숙박</button>
              <button type="button" data-value="교통" class="cat-btn">🚌 교통</button>
              <button type="button" data-value="쇼핑" class="cat-btn">🛍️ 쇼핑</button>
              <button type="button" data-value="기타" class="cat-btn">📌 기타</button>
            </div>
          </div>
          <p id="e-warn" class="edit-warn" style="display:none;"></p>
          <div class="modal-actions">
            <button type="button" onclick="closeEditModal()">취소</button>
            <button type="submit">저장</button>
          </div>
        </form>
      </div>
    </div>

    <section class="add-section" id="schedule-section" style="display:none;">
      <h2>일정 추가</h2>
      <form id="schedule-form">
        <div class="form-row">
          <div class="form-group">
            <label for="s-date">날짜</label>
            <input type="date" id="s-date" required>
          </div>
          <div class="form-group">
            <label for="s-time">시간</label>
            <input type="time" id="s-time">
          </div>
          <div class="form-group">
            <label for="s-place">장소</label>
            <input type="text" id="s-place" placeholder="예) 차이나타운" required maxlength="30">
          </div>
        </div>
        <div class="form-group">
          <label for="s-memo">메모</label>
          <input type="text" id="s-memo" placeholder="간단한 메모를 남겨보세요." maxlength="80">
        </div>
        <div class="form-group">
          <label>카테고리</label>
          <div class="category-selector" id="s-category">
            <button type="button" data-value="관광" class="cat-btn active">🏛️ 관광</button>
            <button type="button" data-value="식사" class="cat-btn">🍽️ 식사</button>
            <button type="button" data-value="숙박" class="cat-btn">🏨 숙박</button>
            <button type="button" data-value="교통" class="cat-btn">🚌 교통</button>
            <button type="button" data-value="쇼핑" class="cat-btn">🛍️ 쇼핑</button>
            <button type="button" data-value="기타" class="cat-btn">📌 기타</button>
          </div>
        </div>
        <p id="s-warn" class="edit-warn" style="display:none;"></p>
        <button type="submit">+ 일정 추가</button>
      </form>
    </section>

    <section class="list-section" id="list-section" style="display:none;">
      <div class="list-header">
        <h2>내 일정 <span id="schedule-count">0</span>개</h2>
        <div class="list-actions">
          <button id="copy-btn" onclick="copySchedule()">📋 텍스트 복사</button>
          <button id="print-btn" onclick="window.print()">🖨️ 인쇄</button>
        </div>
      </div>
      <ul id="schedule-list"></ul>
      <p id="empty-msg" class="empty-msg">아직 추가된 일정이 없습니다.</p>
    </section>
  </main>

  <footer>
    <div class="social-icons">
      <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer"><img src="./icon/facebook.png" alt="페이스북"></a>
      <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer"><img src="./icon/instagram.png" alt="인스타그램"></a>
      <a href="https://twitter.com" target="_blank" rel="noopener noreferrer"><img src="./icon/twitter.png" alt="트위터"></a>
    </div>
    <p>&copy; 2025 인천 여행지 소개 | 문혁진</p>
    <p>문의: example@email.com | 전화: 010-1234-5678</p>
  </footer>

  <script src="./js/common.js"></script>
  <script src="./js/planner.js"></script>
</body>
</html>
