<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="./icon/bridge.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다 - 인천 여행지 소개</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="./css/common.css">
  <style>
    .not-found-wrap {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 0;
    }

    .nf-code {
      font-size: clamp(96px, 20vw, 180px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #0EA5C9 0%, #1E3A5F 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -4px;
      margin-bottom: 8px;
      user-select: none;
    }

.nf-title {
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: 800;
      color: #1E3A5F;
      margin-bottom: 12px;
    }

    .nf-desc {
      font-size: 1rem;
      color: #666;
      max-width: 400px;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .nf-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nf-btn {
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      border: none;
    }

    .nf-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(14,165,201,0.3);
    }

    .nf-btn-primary {
      background: linear-gradient(135deg, #0EA5C9, #1E3A5F);
      color: #fff;
    }

    .nf-btn-secondary {
      background: #fff;
      color: #0EA5C9;
      border: 2px solid #0EA5C9;
    }

    .nf-btn-secondary:hover {
      background: #e8f7fd;
      box-shadow: 0 6px 20px rgba(14,165,201,0.15);
    }

    .nf-links {
      margin-top: 48px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nf-link {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 13px;
      color: #0EA5C9;
      text-decoration: none;
      background: #fff;
      border: 1px solid #e0f5fb;
      transition: background 0.15s, border-color 0.15s;
    }

    .nf-link:hover {
      background: #e8f7fd;
      border-color: #0EA5C9;
    }

    body.dark .nf-title { color: #7EC8E3; }
    body.dark .nf-desc  { color: #aaa; }
    body.dark .nf-btn-secondary {
      background: #0F2035;
      color: #7EC8E3;
      border-color: #7EC8E3;
    }
    body.dark .nf-btn-secondary:hover { background: #0A2535; }
    body.dark .nf-link {
      background: #0F2035;
      color: #7EC8E3;
      border-color: #1a4a5a;
    }
    body.dark .nf-link:hover { background: #0A2535; border-color: #7EC8E3; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">
      <img src="./icon/bridge.png" alt="다리 아이콘" class="icon">
      <h1>인천 여행지 소개</h1>
    </a>
    <nav>
      <ul>
        <li><a href="index.html">홈</a></li>
        <li><a href="about.html">소개</a></li>
        <li><a href="reviews.html">후기</a></li>
        <li><a href="planner.html">플래너</a></li>
        <li><a href="contact.html">문의</a></li>
      </ul>
    </nav>
    <button class="hamburger">☰</button>
    <button class="dark-toggle" id="dark-btn">🌙</button>
  </header>

  <main class="not-found-wrap">
<div class="nf-code">404</div>
    <h2 class="nf-title">페이지를 찾을 수 없어요</h2>
    <p class="nf-desc">
      요청하신 페이지가 삭제되었거나 주소가 변경되었을 수 있습니다.<br>
      아래 버튼을 눌러 다시 시작해보세요.
    </p>
    <div class="nf-actions">
      <a href="index.html" class="nf-btn nf-btn-primary">홈으로 돌아가기</a>
      <button class="nf-btn nf-btn-secondary" onclick="history.back()">이전 페이지</button>
    </div>
    <nav class="nf-links" aria-label="빠른 이동">
      <a href="about.html" class="nf-link">📍 소개</a>
      <a href="regions.html" class="nf-link">🗺️ 인기 지역</a>
      <a href="reviews.html" class="nf-link">⭐ 후기</a>
      <a href="planner.html" class="nf-link">📅 플래너</a>
      <a href="lodging.html" class="nf-link">🏨 숙박</a>
      <a href="contact.html" class="nf-link">💬 문의</a>
    </nav>
  </main>

  <footer>
    <div class="social-icons">
      <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer"><img src="./icon/facebook.png" alt="페이스북"></a>
      <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer"><img src="./icon/instagram.png" alt="인스타그램"></a>
      <a href="https://twitter.com" target="_blank" rel="noopener noreferrer"><img src="./icon/twitter.png" alt="트위터"></a>
    </div>
    <p>&copy; 2025 인천 여행지 소개 | 문혁진</p>
    <p>문의: example@email.com | 전화: 010-1234-5678</p>
  </footer>

  <nav class="bottom-nav">
    <ul>
      <li><a href="index.html"><span class="tab-icon">🏠</span>홈</a></li>
      <li><a href="about.html"><span class="tab-icon">📍</span>소개</a></li>
      <li><a href="reviews.html"><span class="tab-icon">⭐</span>후기</a></li>
      <li><a href="planner.html"><span class="tab-icon">📅</span>플래너</a></li>
      <li><a href="contact.html"><span class="tab-icon">💬</span>문의</a></li>
    </ul>
  </nav>

  <script src="./js/common.js"></script>
</body>
</html>
