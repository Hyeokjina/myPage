<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="./icon/bridge.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의하기 - 인천 여행지 소개</title>
    <meta name="description" content="인천 여행지 소개 페이지에 문의사항을 남겨주세요. 빠르게 답변 드리겠습니다.">
    <meta property="og:title" content="문의하기 - 인천 여행지 소개">
    <meta property="og:description" content="인천 여행지 소개 페이지 문의 양식입니다.">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/contact.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <img src="./icon/bridge.png" alt="다리 아이콘" class="icon">
            <h1>문의하기</h1>
        </a>
        <nav>
            <ul>
                <li><a href="index.html">홈</a></li>
                <li><a href="about.html">소개</a></li>
                <li><a href="reviews.html">후기</a></li>
                <li><a href="planner.html">플래너</a></li>
                <li><a href="contact.html">문의</a></li>
            </ul>
        </nav>
        <button class="hamburger">☰</button>
        <button class="dark-toggle" id="dark-btn">🌙</button>
    </header>

    <button class="back-to-top" id="back-to-top">↑</button>

    <div class="contact-container">
        <div class="contact-header">
            <h2>문의 남기기</h2>
            <p class="contact-sub">궁금한 점이 있으시면 편하게 남겨주세요. 빠르게 답변 드리겠습니다.</p>
        </div>

        <form id="contact-form" novalidate>
            <div class="form-field">
                <label for="name">이름 <span class="required">*</span></label>
                <input type="text" id="name" placeholder="이름을 입력하세요" autocomplete="name">
                <span class="field-error" id="name-error"></span>
            </div>

            <div class="form-field">
                <label for="email">이메일 <span class="required">*</span></label>
                <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
                <span class="field-error" id="email-error"></span>
            </div>

            <div class="form-field">
                <label for="category">문의 유형</label>
                <select id="category">
                    <option value="">선택 안함</option>
                    <option value="여행 정보">여행 정보</option>
                    <option value="숙소 예약">숙소 예약</option>
                    <option value="코스 추천">코스 추천</option>
                    <option value="기타">기타</option>
                </select>
            </div>

            <div class="form-field">
                <label for="message">문의 내용 <span class="required">*</span></label>
                <textarea id="message" rows="6" placeholder="문의 내용을 입력하세요. (최소 10자)"></textarea>
                <div class="textarea-footer">
                    <span class="field-error" id="message-error"></span>
                    <span class="char-counter" id="char-counter">0 / 500</span>
                </div>
            </div>

            <button type="submit" id="submit-btn">
                <span class="btn-text">보내기</span>
                <span class="btn-spinner" aria-hidden="true"></span>
            </button>
        </form>

        <div class="success-msg" id="success-msg">
            <span class="success-icon">✓</span>
            <strong>문의가 접수되었습니다!</strong>
            <p>빠른 시일 내에 답변 드리겠습니다.</p>
        </div>
    </div>

    <footer>
        <div class="social-icons">
            <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer"><img src="./icon/facebook.png" alt="페이스북"></a>
            <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer"><img src="./icon/instagram.png" alt="인스타그램"></a>
            <a href="https://twitter.com" target="_blank" rel="noopener noreferrer"><img src="./icon/twitter.png" alt="트위터"></a>
        </div>
        <p>&copy; 2025 인천 여행지 소개 | 문혁진</p>
        <p>문의: <a href="mailto:example@email.com" style="color:inherit;">example@email.com</a> | 전화: 010-1234-5678</p>
    </footer>

    <nav class="bottom-nav">
        <ul>
            <li><a href="index.html"><span class="tab-icon">🏠</span>홈</a></li>
            <li><a href="about.html"><span class="tab-icon">📍</span>소개</a></li>
            <li><a href="reviews.html"><span class="tab-icon">⭐</span>후기</a></li>
            <li><a href="planner.html"><span class="tab-icon">📅</span>플래너</a></li>
            <li><a href="contact.html"><span class="tab-icon">💬</span>문의</a></li>
        </ul>
    </nav>

    <script src="./js/common.js"></script>
    <script src="./js/contact.js"></script>
</body>
</html>
