<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="./icon/bridge.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문의하기 - 인천 여행지 소개</title>
  <meta name="description" content="인천 여행지 소개 페이지에 문의사항을 남겨주세요. 빠르게 답변 드리겠습니다.">
  <meta property="og:title" content="문의하기 - 인천 여행지 소개">
  <meta property="og:description" content="인천 여행지 소개 페이지 문의 양식입니다.">
  <meta property="og:type" content="website">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/contact.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">
      <img src="./icon/bridge.png" alt="다리 아이콘" class="icon">
      <img src="./icon/incheon.png" alt="도시 아이콘" class="icon">
      <h1>문의하기</h1>
    </a>
    <nav>
      <ul>
        <li><a href="index.html">홈</a></li>
        <li><a href="about.html">소개</a></li>
        <li><a href="contact.html" class="active">문의</a></li>
      </ul>
    </nav>
        <button class="hamburger" onclick="toggleNav()">☰</button>
    <button class="dark-toggle" id="dark-btn" onclick="toggleDark()">🌙</button>
  </header>

  <button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <div class="contact-container">
    <h2>문의 남기기</h2>
    <form>
      <label for="name">이름</label>
      <input type="text" id="name" placeholder="이름을 입력하세요" required>

      <label for="email">이메일</label>
      <input type="email" id="email" placeholder="이메일을 입력하세요." required>

      <label for="message">문의 내용</label>
      <textarea id="message" rows="6" placeholder="문의 내용을 입력하세요." required></textarea>

        <button type="submit">보내기</button>
    </form>
    <p id="success-msg" class="success-msg">문의가 접수되었습니다. 감사합니다!</p>
  </div>

  <footer>
    <div class="social-icons">
      <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer"><img src="./icon/facebook.png" alt="페이스북"></a>
      <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer"><img src="./icon/instagram.png" alt="인스타그램"></a>
      <a href="https://twitter.com" target="_blank" rel="noopener noreferrer"><img src="./icon/twitter.png" alt="트위터"></a>
    </div>
    <p>&copy; 2025 인천 여행지 소개 | 문혁진</p>
    <p>문의: example@email.com | 전화: 010-1234-5678</p>
  </footer>
  <script src="./js/common.js"></script>
  <script src="./js/contact.js"></script>
</body>
</html>
