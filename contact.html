<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문의하기</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/contact.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo" style="text-decoration:none;">
      <img src="./icon/bridge.png" alt="다리 아이콘" class="icon">
      <h1>문의하기</h1>
    </a>
    <nav>
      <ul>
        <li><a href="index.html">홈</a></li>
        <li><a href="about.html">소개</a></li>
        <li><a href="contact.html" class="active">문의</a></li>
      </ul>
    </nav>
    <button class="dark-toggle" id="dark-btn" onclick="toggleDark()">🌙</button>
  </header>

  <button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <div class="contact-container">
    <h2>문의 남기기</h2>
    <form>
      <label for="name">이름</label>
      <input type="text" id="name" placeholder="이름을 입력하세요" required>

      <label for="email">이메일</label>
      <input type="email" id="email" placeholder="이메일을 입력하세요." required>

      <label for="message">문의 내용</label>
      <textarea id="message" rows="6" placeholder="문의 내용을 입력하세요." required></textarea>

        <button type="submit">보내기</button>
    </form>
    <p id="success-msg" style="display:none; margin-top:20px; text-align:center; color:#4FB7B3; font-weight:600;">문의가 접수되었습니다. 감사합니다!</p>
  </div>

  <script src="./js/contact.js"></script>
  <script src="./js/common.js"></script>

  <footer>
    <p>&copy; 2025 인천 여행지 소개! | 문혁진</p>
  </footer>
</body>
</html>
